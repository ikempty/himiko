<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>山田山との会話</title>
  <style>
    :root {
      --page-bg: linear-gradient(180deg, #b5aea2 0%, #8d867b 100%);
      --phone-bg: #9f998f;
      --wallpaper:
        radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.08), transparent 34%),
        radial-gradient(circle at 82% 12%, rgba(255, 255, 255, 0.05), transparent 24%),
        linear-gradient(180deg, rgba(62, 68, 61, 0.28), rgba(37, 41, 37, 0.44));
      --chat-bg:
        linear-gradient(180deg, rgba(67, 73, 66, 0.28), rgba(43, 48, 42, 0.42));
      --header-bg: #76ac68;
      --header-accent: #8fc280;
      --text-main: #242522;
      --text-subtle: #666a64;
      --friend-bubble: rgba(251, 251, 248, 0.94);
      --me-bubble: #d4edbf;
      --bubble-shadow: 0 10px 22px rgba(28, 33, 28, 0.12);
      --panel-bg: rgba(247, 244, 238, 0.92);
      --panel-border: rgba(67, 73, 64, 0.12);
      --input-bg: rgba(246, 244, 238, 0.94);
      --safe-bottom: max(14px, env(safe-area-inset-bottom));
      color-scheme: light;
      font-family: "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", "Meiryo", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--page-bg);
      color: var(--text-main);
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 16px;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent 40%),
        radial-gradient(circle at top, rgba(255, 255, 255, 0.14), transparent 44%);
      pointer-events: none;
    }

    .stage {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 26px;
      width: min(100%, 760px);
    }

    .phone {
      position: relative;
      display: flex;
      flex-direction: column;
      width: min(100%, 390px);
      height: min(844px, calc(100vh - 24px));
      min-height: 720px;
      background: var(--phone-bg);
      border-radius: 32px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.28);
      box-shadow:
        0 30px 72px rgba(29, 32, 28, 0.22),
        0 10px 28px rgba(29, 32, 28, 0.12);
      isolation: isolate;
      flex: 0 0 auto;
    }

    .phone::before {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--wallpaper);
      opacity: 1;
      pointer-events: none;
    }

    .top-status {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 11px 18px 4px;
      color: rgba(255, 255, 255, 0.94);
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      font-weight: 600;
    }

    .top-status__icons {
      display: flex;
      gap: 8px;
      align-items: center;
      opacity: 0.95;
    }

    .top-status__battery {
      position: relative;
      width: 23px;
      height: 11px;
      border: 1.4px solid currentColor;
      border-radius: 3px;
    }

    .top-status__battery::before {
      content: "";
      position: absolute;
      right: -3.8px;
      top: 2.7px;
      width: 2px;
      height: 4.2px;
      border-radius: 0 1px 1px 0;
      background: currentColor;
    }

    .top-status__battery::after {
      content: "";
      position: absolute;
      inset: 1.6px 6px 1.6px 1.6px;
      border-radius: 1.5px;
      background: currentColor;
    }

    .header {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 16px 14px;
      background: linear-gradient(180deg, var(--header-accent), var(--header-bg));
      box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.16);
      color: #f8fff6;
    }

    .header__left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .header__back {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: rgba(255, 255, 255, 0.95);
      background: rgba(255, 255, 255, 0.08);
      font-size: 1.05rem;
      line-height: 1;
      flex: 0 0 auto;
    }

    .header__title {
      min-width: 0;
    }

    .header__name {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header__status {
      margin-top: 2px;
      font-size: 0.74rem;
      opacity: 0.88;
    }

    .header__actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex: 0 0 auto;
    }

    .header__dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      position: relative;
    }

    .header__dot::before {
      content: "";
      position: absolute;
      inset: 50%;
      width: 11px;
      height: 11px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 1.6px solid rgba(255, 255, 255, 0.94);
    }

    .header__dot:last-child::before {
      width: 12px;
      height: 2px;
      border: 0;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 -4px 0 rgba(255, 255, 255, 0.94), 0 4px 0 rgba(255, 255, 255, 0.94);
      border-radius: 999px;
    }

    .chat {
      position: relative;
      z-index: 1;
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 12px 14px 20px;
      background: var(--chat-bg);
      scroll-behavior: smooth;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }

    .chat::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    .date-chip {
      width: fit-content;
      margin: 2px auto 18px;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 0.72rem;
      color: rgba(245, 245, 241, 0.84);
      background: rgba(79, 87, 78, 0.36);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 14px rgba(29, 31, 28, 0.08);
    }

    .message {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      margin: 0 0 14px;
      opacity: 0;
      transform: translateY(16px);
      animation: bubble-in 0.54s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      will-change: opacity, transform;
    }

    .message--friend {
      justify-content: flex-start;
    }

    .message--me {
      justify-content: flex-end;
    }

    .message__bubble-wrap {
      max-width: min(78%, 272px);
      display: flex;
      align-items: flex-end;
      gap: 6px;
    }

    .message--me .message__bubble-wrap {
      flex-direction: row-reverse;
    }

    .message__bubble {
      position: relative;
      padding: 11px 14px 10px;
      border-radius: 18px;
      font-size: 0.96rem;
      line-height: 1.6;
      letter-spacing: 0.01em;
      box-shadow: var(--bubble-shadow);
      border: 1px solid rgba(66, 72, 64, 0.06);
      word-break: break-word;
      overflow-wrap: anywhere;
      white-space: pre-line;
    }

    .message--friend .message__bubble {
      background: var(--friend-bubble);
      border-bottom-left-radius: 8px;
    }

    .message--me .message__bubble {
      background: linear-gradient(180deg, #dff3ce, var(--me-bubble));
      border-bottom-right-radius: 8px;
    }

    .message__bubble::after {
      content: "";
      position: absolute;
      bottom: 0;
      width: 11px;
      height: 14px;
      background: inherit;
      border-bottom: inherit;
      z-index: -1;
    }

    .message--friend .message__bubble::after {
      left: -3px;
      clip-path: polygon(100% 0, 0 100%, 100% 100%);
      border-left: inherit;
    }

    .message--me .message__bubble::after {
      right: -3px;
      clip-path: polygon(0 0, 0 100%, 100% 100%);
      border-right: inherit;
    }

    .message__time {
      font-size: 0.68rem;
      color: rgba(230, 232, 226, 0.78);
      white-space: nowrap;
      padding-bottom: 3px;
      letter-spacing: 0.04em;
      text-shadow: 0 1px 1px rgba(39, 44, 39, 0.12);
    }

    .composer {
      position: relative;
      z-index: 3;
      padding: 10px 12px calc(12px + var(--safe-bottom));
      background:
        linear-gradient(180deg, rgba(220, 214, 204, 0.7), rgba(229, 224, 214, 0.96) 30%),
        rgba(230, 224, 214, 0.9);
      backdrop-filter: blur(18px);
      border-top: 1px solid rgba(67, 73, 64, 0.08);
    }

    .composer__inner {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 20px;
      background: var(--input-bg);
      border: 1px solid rgba(68, 75, 65, 0.08);
      box-shadow: 0 8px 18px rgba(31, 34, 29, 0.06);
    }

    .composer__icon,
    .composer__send {
      position: relative;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      color: rgba(72, 81, 64, 0.78);
      background: rgba(120, 133, 105, 0.08);
    }

    .composer__icon::before,
    .composer__icon::after {
      content: "";
      position: absolute;
      background: currentColor;
      border-radius: 999px;
    }

    .composer__icon::before {
      width: 13px;
      height: 2px;
    }

    .composer__icon::after {
      width: 2px;
      height: 13px;
    }

    .composer__placeholder {
      flex: 1 1 auto;
      min-width: 0;
      color: rgba(93, 98, 89, 0.52);
      font-size: 0.92rem;
    }

    .composer__send::before {
      content: "";
      position: absolute;
      width: 0;
      height: 0;
      border-top: 7px solid transparent;
      border-bottom: 7px solid transparent;
      border-left: 12px solid currentColor;
      transform: translateX(1px);
    }

    .empty-note {
      padding: 80px 20px 0;
      text-align: center;
      color: rgba(243, 244, 240, 0.72);
      font-size: 0.82rem;
      letter-spacing: 0.02em;
      text-shadow: 0 1px 1px rgba(36, 39, 34, 0.16);
    }

    .empty-note.is-hidden {
      display: none;
    }

    .side-controls {
      flex: 0 0 228px;
      position: sticky;
      top: 24px;
      align-self: flex-start;
    }

    .control-panel {
      display: grid;
      gap: 14px;
      padding: 18px;
      border-radius: 24px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      box-shadow:
        0 22px 52px rgba(40, 42, 37, 0.1),
        0 8px 18px rgba(40, 42, 37, 0.05);
      backdrop-filter: blur(16px);
    }

    .control-title {
      margin: 0;
      font-size: 0.88rem;
      font-weight: 700;
      color: #30352f;
      letter-spacing: 0.02em;
    }

    .control-copy {
      margin: -8px 0 0;
      font-size: 0.76rem;
      line-height: 1.55;
      color: var(--text-subtle);
    }

    .segment {
      display: inline-flex;
      padding: 3px;
      gap: 4px;
      border-radius: 999px;
      background: rgba(119, 131, 106, 0.1);
      min-width: 0;
    }

    .segment button,
    .control-button,
    .speed-select {
      font: inherit;
      border: 0;
      outline: 0;
    }

    .segment button {
      flex: 1 1 0;
      min-width: 0;
      padding: 9px 10px;
      border-radius: 999px;
      background: transparent;
      color: var(--text-subtle);
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
    }

    .segment button.is-active {
      background: rgba(255, 255, 255, 0.96);
      color: #2f4330;
      box-shadow: 0 3px 10px rgba(39, 43, 36, 0.09);
    }

    .speed-wrap {
      display: grid;
      gap: 6px;
    }

    .speed-label {
      font-size: 0.72rem;
      color: var(--text-subtle);
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .speed-select {
      width: 100%;
      padding: 10px 30px 10px 12px;
      border-radius: 14px;
      background:
        linear-gradient(45deg, transparent 50%, #6b7864 50%),
        linear-gradient(135deg, #6b7864 50%, transparent 50%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(248, 247, 242, 0.92));
      background-position:
        calc(100% - 14px) calc(50% - 2px),
        calc(100% - 9px) calc(50% - 2px),
        0 0;
      background-size: 5px 5px, 5px 5px, 100% 100%;
      background-repeat: no-repeat;
      color: #334234;
      font-size: 0.82rem;
      font-weight: 700;
      appearance: none;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(39, 43, 36, 0.08);
    }

    .control-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .control-button {
      width: 100%;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.96);
      color: #314232;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(39, 43, 36, 0.08);
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .control-button:hover,
    .segment button:hover,
    .speed-select:hover {
      transform: translateY(-1px);
    }

    .control-button:active,
    .segment button:active {
      transform: translateY(0);
    }

    .control-button--primary {
      background: #6eaa63;
      color: #f7fff4;
    }

    @keyframes bubble-in {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 880px) {
      .stage {
        flex-direction: column;
        align-items: center;
      }

      .side-controls {
        width: min(100%, 390px);
        flex-basis: auto;
        position: static;
      }
    }

    @media (max-width: 430px) {
      body {
        padding: 0;
      }

      .stage {
        width: 100%;
        gap: 0;
      }

      .phone {
        width: 100vw;
        height: 100vh;
        min-height: 100vh;
        border-radius: 0;
        border: 0;
        box-shadow: none;
      }

      .side-controls {
        width: 100%;
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="phone" aria-label="会話演出画面">
      <div class="top-status" aria-hidden="true">
        <div>9:41</div>
        <div class="top-status__icons">
          <span>5G</span>
          <span class="top-status__battery"></span>
        </div>
      </div>

      <header class="header">
        <div class="header__left">
          <div class="header__back" aria-hidden="true">‹</div>
          <div class="header__title">
            <div class="header__name">山田山</div>
            <div class="header__status">個人トーク</div>
          </div>
        </div>
        <div class="header__actions" aria-hidden="true">
          <div class="header__dot"></div>
          <div class="header__dot"></div>
        </div>
      </header>

      <main class="chat" id="chat" aria-live="polite">
        <div class="date-chip">3月10日 火曜日</div>
        <div class="empty-note" id="emptyNote">会話はまだ表示されていません</div>
      </main>

      <div class="composer" aria-hidden="true">
        <div class="composer__inner">
          <div class="composer__icon"></div>
          <div class="composer__placeholder">メッセージ</div>
          <div class="composer__send"></div>
        </div>
      </div>
    </div>

    <aside class="side-controls" aria-label="再生設定">
      <div class="control-panel">
        <h2 class="control-title">再生設定</h2>
        <p class="control-copy">スクリーンショットには入らないよう、操作系はトーク画面の外に分離しています。</p>

        <div class="segment" role="tablist" aria-label="表示モード">
          <button type="button" class="js-mode is-active" data-mode="sequence" role="tab" aria-selected="true">1件ずつ</button>
          <button type="button" class="js-mode" data-mode="all" role="tab" aria-selected="false">全表示</button>
        </div>

        <div class="speed-wrap">
          <label class="speed-label" for="speed">速度</label>
          <select class="speed-select" id="speed" aria-label="表示速度">
            <option value="0.6">遅め</option>
            <option value="1" selected>標準</option>
            <option value="1.15">やや速い</option>
          </select>
        </div>

        <div class="control-actions">
          <button type="button" class="control-button control-button--primary" id="startButton">再生</button>
          <button type="button" class="control-button" id="resetButton">リセット</button>
        </div>
      </div>
    </aside>
  </div>

  <script>
    // 会話テキストはここだけ差し替えれば再利用できます。
    const messages = [
      { speaker: "friend", text: "卑弥呼って、どんな人ってイメージ？" },
      { speaker: "me", text: "急だな" },
      { speaker: "me", text: "邪馬台国の女王" },
      { speaker: "me", text: "あと魏志倭人伝に出てくる人、くらいかな" },
      { speaker: "friend", text: "うん" },
      { speaker: "friend", text: "たぶんその認識がいちばん多い" },
      { speaker: "me", text: "違うの？" },
      { speaker: "friend", text: "違うっていうより、そこで止まってることが多い" },
      { speaker: "me", text: "まあ、確かに" },
      { speaker: "me", text: "そこから先はふわっとしてるかも" },
      { speaker: "me", text: "日本史でやった気はするけど忘れた笑" },
      { speaker: "friend", text: "そうそう" },
      { speaker: "friend", text: "名前は有名だけど、何した人かまで聞かれると意外とみんな曖昧なんだよね" },
      { speaker: "me", text: "じゃあ、ちゃんと言うと何した人なの" },
      { speaker: "friend", text: "歴史の教科書に出てくる昔の人なだけ、って感じではないかな" },
      { speaker: "friend", text: "魏とのやり取りもしていたり" },
      { speaker: "friend", text: "ちゃんと国を動かしてた側の人として見た方が自然だと思う" },
      { speaker: "me", text: "あー、そこは学校でもやった気がする" },
      { speaker: "me", text: "使者を送ったりしてたやつだよね" },
      { speaker: "friend", text: "そう" },
      { speaker: "friend", text: "で、その卑弥呼がいた邪馬台国の方も\nみんな知ってるようで、話し始めると急に難しくなる" },
      { speaker: "me", text: "場所の話とか？" },
      { speaker: "friend", text: "そう" },
      { speaker: "friend", text: "結局どこにあったのか、まだ決着してない" },
      { speaker: "me", text: "北九州説だっけ？" },
      { speaker: "friend", text: "そう思ってる人は多い" },
      { speaker: "friend", text: "北九州説は有力だし、近畿も強い" },
      { speaker: "friend", text: "思ってるよりきれいに整理されている話じゃない" },
      { speaker: "me", text: "そんな有名なのに、まだそこ揉めるんだ" },
      { speaker: "friend", text: "揉める" },
      { speaker: "friend", text: "卑弥呼まわりって、そういうの結構多い" },
      { speaker: "me", text: "え、まだある？" },
      { speaker: "friend", text: "ある" },
      { speaker: "friend", text: "というか、引っかかってるのはむしろここから" },
      { speaker: "me", text: "え、何" },
      { speaker: "friend", text: "卑弥呼って、普通の王としてだけ見るのも少し違う気がするんだよね" },
      { speaker: "me", text: "どういうこと？" },
      { speaker: "friend", text: "魏志倭人伝に「鬼道に事えた」って出てくる" },
      { speaker: "me", text: "鬼道って何？" },
      { speaker: "friend", text: "ざっくり言えば、まじないとか祈りとか、神がかりみたいなもの" },
      { speaker: "friend", text: "そういうものに深く関わっていた、って読まれることが多い" },
      { speaker: "me", text: "へえ、うさんくさいな" },
      { speaker: "friend", text: "そこが面白いし、少し引っかかるところでもある" },
      { speaker: "me", text: "最近それを調べてるの？" },
      { speaker: "friend", text: "うん" },
      { speaker: "friend", text: "前から引っかかってたところがあって、資料を見直してる" },
      { speaker: "me", text: "どこがそんなに引っかかるの" },
      { speaker: "friend", text: "そこはまだ言わないでおく" },
      { speaker: "me", text: "いや気になるけど" },
      { speaker: "friend", text: "まあまあ" },
      { speaker: "me", text: "いやいや気になるんだけど" },
      { speaker: "friend", text: "今度説明するわ" },
      { speaker: "friend", text: "まあ最初は、普通の古代史の話にしか聞こえないと思うけど" },
      { speaker: "me", text: "“最初は”って付いたね" },
      { speaker: "friend", text: "付いた" }
    ];

    const baseTime = { hour: 21, minute: 14 };
    const modeButtons = Array.from(document.querySelectorAll(".js-mode"));
    const speedSelect = document.getElementById("speed");
    const startButton = document.getElementById("startButton");
    const resetButton = document.getElementById("resetButton");
    const chat = document.getElementById("chat");
    const emptyNote = document.getElementById("emptyNote");
    const dateChip = chat.querySelector(".date-chip");

    const state = {
      mode: "sequence",
      speed: Number(speedSelect.value),
      isPlaying: false,
      playToken: 0
    };

    function pad(number) {
      return String(number).padStart(2, "0");
    }

    function getMessageTime(index) {
      const elapsedMinutes = Math.floor(index / 4);
      const totalMinutes = baseTime.hour * 60 + baseTime.minute + elapsedMinutes;
      const hour = Math.floor(totalMinutes / 60) % 24;
      const minute = totalMinutes % 60;
      return `${pad(hour)}:${pad(minute)}`;
    }

    function wait(ms) {
      return new Promise((resolve) => {
        window.setTimeout(resolve, ms);
      });
    }

    function getDelay(text) {
      const lineCount = text.split("\n").length;
      const textWeight = Math.min(text.replace(/\s/g, "").length * 11, 220);
      const base = 820 + Math.random() * 600;
      return Math.round((base + lineCount * 70 + textWeight) / state.speed);
    }

    function setMode(mode) {
      state.mode = mode;
      modeButtons.forEach((button) => {
        const active = button.dataset.mode === mode;
        button.classList.toggle("is-active", active);
        button.setAttribute("aria-selected", String(active));
      });
    }

    function toggleEmptyNote() {
      const hasMessages = chat.querySelector(".message") !== null;
      emptyNote.classList.toggle("is-hidden", hasMessages);
    }

    function scrollToBottom(instant = false) {
      chat.scrollTo({
        top: chat.scrollHeight,
        behavior: instant ? "auto" : "smooth"
      });
    }

    // 吹き出し1件を描画して末尾へ追加します。
    function renderMessage(message, index) {
      const row = document.createElement("article");
      row.className = `message message--${message.speaker}`;

      const bubbleWrap = document.createElement("div");
      bubbleWrap.className = "message__bubble-wrap";

      const bubble = document.createElement("div");
      bubble.className = "message__bubble";
      bubble.textContent = message.text;

      const time = document.createElement("div");
      time.className = "message__time";
      time.textContent = getMessageTime(index);

      bubbleWrap.appendChild(bubble);
      bubbleWrap.appendChild(time);
      row.appendChild(bubbleWrap);

      chat.appendChild(row);
      toggleEmptyNote();
      scrollToBottom();
    }

    function clearMessages() {
      state.playToken += 1;
      state.isPlaying = false;
      chat.querySelectorAll(".message").forEach((node) => node.remove());
      chat.appendChild(emptyNote);
      chat.appendChild(dateChip);
      chat.insertBefore(dateChip, emptyNote);
      toggleEmptyNote();
      scrollToBottom(true);
      startButton.textContent = "再生";
    }

    async function playMessages() {
      const token = ++state.playToken;
      state.isPlaying = true;
      startButton.textContent = state.mode === "all" ? "再表示" : "再生中";

      chat.querySelectorAll(".message").forEach((node) => node.remove());
      toggleEmptyNote();
      scrollToBottom(true);

      if (state.mode === "all") {
        messages.forEach((message, index) => {
          renderMessage(message, index);
        });
        state.isPlaying = false;
        startButton.textContent = "再表示";
        return;
      }

      for (let index = 0; index < messages.length; index += 1) {
        if (token !== state.playToken) {
          return;
        }

        renderMessage(messages[index], index);

        if (index < messages.length - 1) {
          await wait(getDelay(messages[index].text));
        }
      }

      if (token === state.playToken) {
        state.isPlaying = false;
        startButton.textContent = "再生";
      }
    }

    function restartPlayback() {
      clearMessages();
      playMessages();
    }

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setMode(button.dataset.mode);
        restartPlayback();
      });
    });

    speedSelect.addEventListener("change", () => {
      state.speed = Number(speedSelect.value);
      if (state.mode === "all") {
        return;
      }
      restartPlayback();
    });

    startButton.addEventListener("click", () => {
      restartPlayback();
    });

    resetButton.addEventListener("click", () => {
      clearMessages();
    });

    scrollToBottom(true);
    playMessages();
  </script>
</body>
</html>
