<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Story Generator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="control-panel" aria-label="操作パネル">
      <section class="panel-card panel-card--hero">
        <p class="eyebrow">CHAT STORY BASE</p>
        <h1 id="work-title">作品タイトル</h1>
        <p id="work-summary" class="panel-note">
          story-data.js を差し替えるだけで別作品に転用できます。
        </p>
      </section>

      <section class="panel-card">
        <div class="section-row">
          <h2>表示設定</h2>
          <button id="capture-toggle" class="button button--ghost" type="button">
            クリーン表示
          </button>
        </div>

        <div class="nav-buttons">
          <button id="autoplay-toggle" class="button button--ghost" type="button">
            自動再生
          </button>
        </div>

        <label class="field" for="speed-select">
          <span class="field__label">再生速度</span>
          <select id="speed-select" class="field__control">
            <option value="2400">ゆっくり</option>
            <option value="1600" selected>標準</option>
            <option value="1000">速い</option>
            <option value="650">かなり速い</option>
          </select>
        </label>

        <div class="nav-buttons">
          <button id="prev-post-button" class="button" type="button">← 前の投稿</button>
          <button id="next-post-button" class="button" type="button">次の投稿 →</button>
        </div>

        <p class="panel-note">
          キーボード: <span class="keycap">←</span> <span class="keycap">→</span> 投稿移動 /
          <span class="keycap">1</span> <span class="keycap">2</span> <span class="keycap">3</span> 投稿切替 /
          <span class="keycap">P</span> 自動再生 /
          <span class="keycap">C</span> クリーン表示 /
          <span class="keycap">Esc</span> 解除
        </p>
      </section>

      <section class="panel-card">
        <div class="section-row">
          <h2>投稿</h2>
          <span id="post-counter" class="counter-text">-</span>
        </div>
        <div id="post-tabs" class="chip-tabs" aria-label="投稿切替"></div>
      </section>
    </aside>

    <main class="preview-stage">
      <div id="capture-hint" class="capture-hint" hidden>
        クリーン表示中 / C または Esc で解除
      </div>

      <div class="phone-frame">
        <section class="phone-screen" aria-label="縦型チャットプレビュー">
          <header class="phone-header">
            <div class="status-bar" aria-hidden="true">
              <span id="status-time">09:41</span>
              <span class="status-icons">◎ ◎ ◎ 95%</span>
            </div>

            <div class="chat-header">
              <p id="group-name" class="group-name">グループ名</p>
            </div>
          </header>

          <div id="chat-scroll" class="chat-scroll">
            <div id="chat-messages" class="message-list"></div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="story-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
